<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>NeatTube</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="brand">
        <img src="../icons/icon32.png" alt="NeatTube" class="brand-icon">
        <h1>NeatTube</h1>
      </div>
      <label class="toggle-switch master-toggle" id="master-toggle-label">
        <input type="checkbox" id="extensionEnabled">
        <span class="slider"></span>
      </label>
    </header>

    <div class="divider"></div>

    <section class="features" id="features-section">
      <div class="feature-row">
        <span class="feature-label">🚫 Hide Shorts</span>
        <label class="toggle-switch">
          <input type="checkbox" id="shortsRemoval">
          <span class="slider"></span>
        </label>
      </div>

      <div class="feature-row">
        <span class="feature-label">🔒 Filter out Members-Only</span>
        <label class="toggle-switch">
          <input type="checkbox" id="membersOnlyFilter">
          <span class="slider"></span>
        </label>
      </div>

      <div class="feature-row">
        <span class="feature-label">🖼️ Picture in Picture</span>
        <label class="toggle-switch">
          <input type="checkbox" id="pictureInPicture">
          <span class="slider"></span>
        </label>
      </div>

      <div class="feature-row">
        <span class="feature-label">👎 Show Dislike count</span>
        <label class="toggle-switch">
          <input type="checkbox" id="dislikeCount">
          <span class="slider"></span>
        </label>
      </div>

      <div class="feature-row">
        <span class="feature-label">🎬 Auto HD Quality</span>
        <label class="toggle-switch">
          <input type="checkbox" id="autoQuality">
          <span class="slider"></span>
        </label>
      </div>

      <div class="feature-row quality-row" id="quality-selector-row">
        <span class="feature-label">Preferred resolution</span>
        <select id="preferredQuality" class="select-input">
          <option value="Auto">Auto</option>
          <option value="144p">144p</option>
          <option value="240p">240p</option>
          <option value="360p">360p</option>
          <option value="480p">480p</option>
          <option value="720p">720p</option>
          <option value="1080p">1080p</option>
          <option value="1440p">1440p</option>
          <option value="2160p">2160p (4K)</option>
          <option value="4320p">4320p (8K)</option>
        </select>
      </div>
    </section>

    <div class="divider"></div>

    <footer class="popup-footer">
      <a href="#" id="open-options" class="options-link">⚙ Full Settings</a>
      <span class="yt-note">Only active on youtube.com</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
